name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Typecheck
        run: pnpm --filter frontend typecheck

      - name: Verify generated contract types
        run: |
          pnpm --filter frontend gen:types
          git diff --exit-code

      - name: Test
        run: pnpm --filter frontend test

  backend:
    name: backend
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve solution or project target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          target="$(git ls-files '*.sln' | head -n 1)"
          if [ -z "$target" ]; then
            target="$(git ls-files '*.csproj' | head -n 1)"
          fi

          if [ -z "$target" ]; then
            echo "No .sln or .csproj found for backend CI." >&2
            exit 1
          fi

          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "Using backend target: $target"

      - name: Restore Dependencies
        run: dotnet restore "${{ steps.target.outputs.target }}"

      - name: Build
        id: build
        run: dotnet build -c Debug --no-restore "${{ steps.target.outputs.target }}"

      - name: Test
        run: dotnet test --logger "trx" --no-build -c Debug --verbosity normal "${{ steps.target.outputs.target }}"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: ${{ steps.build.outcome == 'success' }}
        with:
          files: |
            ./**/TestResults/*.trx
          check_name: "Backend Test Results"
