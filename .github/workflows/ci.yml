name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gitVersion:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      branchName: ${{ steps.version.outputs.branchName }}
      semVer: ${{ steps.version.outputs.semVer }}
      sha: ${{ steps.version.outputs.sha }}
      nugetVersion: ${{ steps.version.outputs.nugetVersion }}
      assemblySemFileVer: ${{ steps.version.outputs.assemblySemFileVer }}
      informationalVersion: ${{ steps.version.outputs.informationalVersion }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tags and main history are available
        run: |
          git fetch --force --tags origin main

      - name: Determine semantic version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        shell: bash
        run: |
          set -euo pipefail

          latest_tag=""
          for ref in origin/main main HEAD; do
            if tag=$(git describe --tags --abbrev=0 "$ref" 2>/dev/null); then
              latest_tag="$tag"
              break
            fi
          done

          if [ -z "$latest_tag" ]; then
            if tag=$(git describe --tags --abbrev=0 2>/dev/null); then
              latest_tag="$tag"
            fi
          fi

          clean_tag="$latest_tag"
          clean_tag="${clean_tag%%-*}"
          clean_tag="${clean_tag%%+*}"

          parse_numbers() {
            local version="$1"
            if [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              return
            fi

            mapfile -t numbers < <(grep -oE '[0-9]+' <<<"$version" || true)
            case "${#numbers[@]}" in
              0)
                major=0 minor=1 patch=0 ;;
              1)
                major="${numbers[0]}" minor=0 patch=0 ;;
              2)
                major="${numbers[0]}" minor="${numbers[1]}" patch=0 ;;
              *)
                major="${numbers[0]}" minor="${numbers[1]}" patch="${numbers[2]}" ;;
            esac
          }

          initial_release=false
          if [ -n "$clean_tag" ]; then
            parse_numbers "$clean_tag"
          else
            initial_release=true
            major=0
            minor=1
            patch=0
          fi

          message=""
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            number="${PR_NUMBER:-}"
            title="${PR_TITLE:-}"
            body="${PR_BODY:-}"
            if [ -n "$number" ]; then
              message="Merge pull request #$number"
            fi
            if [ -n "$title" ]; then
              if [ -n "$message" ]; then message+=$'\n'; fi
              message+="$title"
            fi
            if [ -n "$body" ]; then
              if [ -n "$message" ]; then message+=$'\n'; fi
              message+="$body"
            fi
          else
            message="${HEAD_COMMIT_MSG:-}"
            if [ -z "$message" ]; then
              message="$(git log -1 --pretty=%B)"
            fi
          fi

          bump=$(tr '[:upper:]' '[:lower:]' <<<"$message" \
            | grep -oE '\+semver:[[:space:]]*(none|patch|minor|major)' \
            | tail -n1 \
            | cut -d: -f2 \
            | sed 's/^[[:space:]]*//' \
            || true)
          bump=${bump:-patch}

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              if [ "$initial_release" = false ]; then
                patch=$((patch + 1))
              fi
              ;;
            none)
              ;;
          esac

          new_version="$major.$minor.$patch"
          nuget_version="$new_version"
          assembly_sem_file="$major.$minor.$patch.0"
          sha="${GITHUB_SHA:-}"
          if [ -n "$sha" ]; then
            informational="$new_version+${sha:0:7}"
          else
            informational="$new_version"
          fi

          ref="${GITHUB_REF:-}"
          branch_name="$ref"
          if [[ "$ref" == refs/heads/* ]]; then
            branch_name="${ref#refs/heads/}"
          elif [[ "$ref" == refs/pull/* ]]; then
            branch_name="${ref#refs/}"
          elif [ -z "$branch_name" ]; then
            branch_name="${GITHUB_REF_NAME:-}"
          fi

          {
            echo "branchName=$branch_name"
            echo "semVer=$new_version"
            echo "sha=$sha"
            echo "nugetVersion=$nuget_version"
            echo "assemblySemFileVer=$assembly_sem_file"
            echo "informationalVersion=$informational"
          } >>"$GITHUB_OUTPUT"

          echo "VersionPrefix=$new_version" >>"$GITHUB_ENV"

  frontend:
    needs: [gitVersion]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Typecheck
        run: pnpm --filter frontend typecheck

      - name: Verify generated contract types
        run: |
          pnpm --filter frontend gen:types
          git diff --exit-code

      - name: Test
        run: pnpm --filter frontend test

  backend:
    name: backend
    needs: [gitVersion]
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve solution or project target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          target="$(git ls-files '**/*.sln' | head -n 1)"
          if [ -z "$target" ]; then
            target="$(git ls-files '**/*.csproj' | head -n 1)"
          fi

          if [ -z "$target" ]; then
            echo "No .sln or .csproj found for backend CI." >&2
            exit 1
          fi

          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "Using backend target: $target"

      - name: Restore Dependencies
        run: dotnet restore "${{ steps.target.outputs.target }}"

      - name: Build
        id: build
        run: dotnet build -c Debug --no-restore "${{ steps.target.outputs.target }}"

      - name: Test
        run: |
          dotnet test --logger "trx" --no-build -c Debug --verbosity normal `
            /p:AssemblyVersion=${{ needs.gitVersion.outputs.assemblySemFileVer }} `
            /p:FileVersion=${{ needs.gitVersion.outputs.assemblySemFileVer }} `
            /p:InformationalVersion=${{ needs.gitVersion.outputs.informationalVersion }} `
            "${{ steps.target.outputs.target }}"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: ${{ steps.build.outcome == 'success' }}
        with:
          files: |
            ./**/TestResults/*.trx
          check_name: "Backend Test Results"
